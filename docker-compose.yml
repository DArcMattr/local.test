services:
  web:
    image: nginx:alpine
    environment:
      - BROWSERSYNC_HOST=${BROWSERSYNC_HOST:-local.localhost}
    restart: always
    volumes:
      - ./htdocs:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./tls:/usr/share/nginx/tls
      - ./logs:/usr/share/nginx/logs
    ports:
      - 80:80
      - 443:443
  php-fpm:
    build: docker/php-fpm
    volumes:
      - ./htdocs:/usr/share/nginx/html
